<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Builder – postav si herní počítač</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--bg:#0b1220;--card:#131f36;--card2:#1c2c4a;--line:#2a3c5e;--cyan:#38bdf8;--good:#22c55e;--bad:#ef4444;--amber:#fbbf24;--purple:#a78bfa;--text:#e6edf7;--muted:#93a4bd;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:radial-gradient(circle at 50% -10%,#141d38,#0b1220 65%);color:var(--text);min-height:100vh;line-height:1.5;}
  .wrap{max-width:940px;margin:0 auto;padding:12px 12px 110px;}
  h1{font-size:22px;text-align:center;margin:6px 0 2px;}
  .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:10px;}
  .name{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--text);font-size:15px;margin-bottom:12px;}

  .dots{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
  .dots .d{padding:4px 12px;border-radius:8px;background:#22314e;font-size:12px;font-weight:800;color:var(--muted);}
  .dots .d.done{background:var(--good);color:#04121f;}

  .missions{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:620px){.missions{grid-template-columns:1fr 1fr;}}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:border-color .15s;}
  .mcard:hover{border-color:var(--cyan);}
  .mcard.done{border-color:var(--good);}
  .mcard .ic{font-size:38px;}
  .mcard h3{margin:6px 0 4px;font-size:19px;}
  .mcard p{color:var(--muted);font-size:13.5px;margin:6px 0 0;}
  .mcard .badge{display:inline-block;margin-top:10px;font-size:12px;font-weight:800;color:var(--good);}

  .chips{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;position:sticky;top:0;background:linear-gradient(#0b1220,#0b1220ee);z-index:5;}
  .chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text);white-space:nowrap;display:flex;gap:6px;align-items:center;}
  .chip.active{background:var(--cyan);color:#04121f;border-color:var(--cyan);}
  .chip .ok{color:var(--good);font-weight:900;} .chip.active .ok{color:#04121f;}
  .missionBar{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:13px;}
  .missionBar b{color:var(--amber);} .missionBar .link{margin-left:auto;color:var(--cyan);cursor:pointer;text-decoration:underline;}

  .catHead{margin:6px 0 8px;} .catHead h2{font-size:19px;margin:0;} .catHead p{color:var(--muted);font-size:13px;margin:2px 0 0;}
  .cards{display:grid;grid-template-columns:1fr;gap:10px;}
  @media(min-width:640px){.cards{grid-template-columns:1fr 1fr;}}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;transition:border-color .12s;position:relative;}
  .pcard:hover{border-color:var(--cyan);}
  .pcard.sel{border-color:var(--good);background:#13291d;}
  .pcard .brand{font-size:12px;color:var(--purple);font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
  .pcard .nm{font-weight:800;font-size:15px;margin:2px 0 4px;padding-right:74px;}
  .pcard .spec{font-size:12.5px;color:var(--muted);line-height:1.55;}
  .pcard .spec b{color:var(--text);}
  .pcard .pr{position:absolute;top:12px;right:12px;font-weight:800;color:var(--amber);font-size:14px;}
  .pcard .selmark{display:none;position:absolute;bottom:10px;right:12px;color:var(--good);font-weight:800;font-size:12px;}
  .pcard.sel .selmark{display:block;}

  .footer{position:fixed;left:0;right:0;bottom:0;background:#0c1424;border-top:1px solid var(--line);padding:10px 14px;z-index:8;}
  .footer .inner{max-width:940px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .footer .info{flex:1;font-size:13px;color:var(--muted);} .footer .info b{color:var(--text);}
  .bigbtn{border:none;border-radius:11px;padding:13px 20px;font-size:16px;font-weight:800;cursor:pointer;color:#04121f;background:linear-gradient(180deg,#86efac,#22c55e);}
  .bigbtn:disabled{opacity:.5;cursor:not-allowed;} .bigbtn:active{transform:translateY(1px);}

  .report{display:none;} .report.show{display:block;}
  .verdict{border-radius:14px;padding:16px;text-align:center;margin-bottom:12px;}
  .verdict.ok{background:linear-gradient(180deg,#134e2a,#0b1220);border:1px solid var(--good);}
  .verdict.no{background:linear-gradient(180deg,#4a1620,#0b1220);border:1px solid var(--bad);}
  .verdict h2{margin:6px 0;font-size:24px;}
  .checkList{background:var(--card);border-radius:12px;padding:12px;margin-bottom:12px;}
  .checkList h4{margin:0 0 8px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .chk{font-size:13.5px;padding:5px 0;border-bottom:1px solid #1b2740;} .chk:last-child{border-bottom:none;}
  .chk.ok{color:#bbf7d0;} .chk.bad{color:#fecaca;}

  /* HIGHTECH DASHBOARD */
  .panel{background:linear-gradient(180deg,#0e1a30,#0a1322);border:1px solid #24405f;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 0 24px rgba(56,189,248,.06) inset;}
  .panel .ph{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#7fa8c9;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .panel .ph::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
  .scoreBig{display:flex;align-items:baseline;gap:10px;justify-content:center;margin:4px 0 8px;}
  .scoreBig .n{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:46px;font-weight:800;color:#e6f3ff;text-shadow:0 0 14px rgba(56,189,248,.5);}
  .scoreBig .m{color:var(--muted);font-size:15px;}
  .meter{height:26px;background:#081020;border-radius:8px;overflow:hidden;border:1px solid #24405f;}
  .meter>div{height:100%;background:linear-gradient(90deg,#22c55e,#38bdf8,#a78bfa);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#04121f;font-weight:800;font-size:13px;transition:width .8s;}
  .catg{text-align:center;margin-top:10px;font-weight:800;color:var(--cyan);}
  .fps{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;text-align:center;}
  .fps .f{background:#0c1a30;border:1px solid #22405f;border-radius:10px;padding:10px;}
  .fps .f .n{font-family:monospace;font-size:24px;font-weight:800;color:var(--cyan);} .fps .f .l{font-size:11px;color:var(--muted);}
  .dash{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  @media(min-width:620px){.dash{grid-template-columns:repeat(4,1fr);}}
  .tile{background:linear-gradient(180deg,#101d33,#0b1526);border:1px solid #24405f;border-radius:12px;padding:11px;position:relative;overflow:hidden;}
  .tile::after{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(56,189,248,.5),transparent);}
  .tile .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:#7fa8c9;}
  .tile .val{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:20px;font-weight:800;color:#e6f3ff;margin-top:3px;line-height:1.15;}
  .tile .val small{font-size:11px;color:#7fa8c9;font-weight:600;}
  .tile .bar{height:6px;background:#081020;border-radius:4px;margin-top:8px;overflow:hidden;}
  .tile .bar>i{display:block;height:100%;border-radius:4px;}
  .b-cyan{background:linear-gradient(90deg,#0ea5e9,#38bdf8);}
  .b-green{background:linear-gradient(90deg,#16a34a,#22c55e);}
  .b-amber{background:linear-gradient(90deg,#d97706,#fbbf24);}
  .b-purple{background:linear-gradient(90deg,#7c3aed,#a78bfa);}
  .b-red{background:linear-gradient(90deg,#dc2626,#f87171);}
  .note{font-size:13px;margin-top:10px;color:#dbe7ff;} .note b{color:var(--amber);}
  .rbtns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .rbtns button{flex:1;min-width:130px;border:none;border-radius:10px;padding:12px;font-weight:800;font-size:14px;cursor:pointer;background:var(--card2);color:var(--text);}
  .rbtns .fix{background:linear-gradient(180deg,#fca5a5,#ef4444);color:#04121f;}
  .code{font-family:monospace;font-size:20px;font-weight:800;color:var(--amber);letter-spacing:2px;}
  .done-banner{background:linear-gradient(180deg,#3b1a5e,#0b1220);border:1px solid var(--purple);border-radius:14px;padding:16px;text-align:center;margin-bottom:12px;display:none;}
</style>

  </div>

  <div id="shop" style="display:none">
    <div class="missionBar" id="missionBar"></div>
    <div class="chips" id="chips"></div>
    <div class="catHead" id="catHead"></div>
    <div class="cards" id="cards"></div>
  </div>

  <div class="report" id="report"></div>
</div>

<div class="footer" id="footer" style="display:none">

    <button class="bigbtn" id="buildBtn" onclick="buildIt()" disabled>🔧 Sestavit počítač</button>
  </div>
</div>

const CATS=[
 {key:'case',lab:'Skříň',ic:'📦',hint:'Určuje velikost desky, max délku grafiky, typ zdroje a výšku chladiče. Začni tady.'},
 {key:'mb',  lab:'Deska',ic:'🟩',hint:'Určuje socket procesoru, typ paměti a sloty. Musí se vejít do skříně.'},
 {key:'cpu', lab:'Procesor',ic:'🧠',hint:'Musí mít stejný socket jako deska.'},
 {key:'cool',lab:'Chladič',ic:'🌀',hint:'Musí sednout na socket, vejít se do skříně a zvládnout teplo procesoru.'},
 {key:'ram', lab:'RAM',ic:'📊',hint:'Typ (DDR4/DDR5) musí odpovídat desce.'},
 {key:'gpu', lab:'Grafika',ic:'🎮',hint:'Nesmí být delší, než dovolí skříň. Žere nejvíc energie.'},
 {key:'sto', lab:'Úložiště',ic:'💾',hint:'SSD je pro hry rychlejší než HDD.'},
 {key:'psu', lab:'Zdroj',ic:'🔌',hint:'Musí mít dost wattů a správný formát (ATX/SFX) pro skříň.'},
];
const spec={
 case:c=>`velikosti <b>${c.form.join(' / ')}</b> · grafika do <b>${c.maxGpu} mm</b> · chladič do <b>${c.maxCool} mm</b> · zdroj <b>${c.psu}</b> · vodní do ${c.rad} mm`,
 mb:  c=>`socket <b>${c.socket}</b> · ${c.chip} · <b>${c.ram}</b> · <b>${c.form}</b> (${c.dims} mm)<br>sloty: RAM <b>${c.ramSlots}×</b> · PCIe ×16 <b>${c.pcie16}×</b> · PCIe ×1 <b>${c.pcie1}×</b> · M.2 <b>${c.m2}×</b> · SATA <b>${c.sata}×</b>`,
 cpu: c=>`socket <b>${c.socket}</b> · ${c.cores} · chlazení <b>${c.tdp} W</b> · špička ${c.power} W · herní <b>${c.tier}/100</b> · produktivita <b>${c.mc}/100</b>`,
 cool:c=> c.type==='air' ? `vzduch · ${c.sockets.join('/')} · výška <b>${c.height} mm</b> · uchladí do <b>${c.tdpRated} W</b> · ~${c.noise} dB` : `voda AIO <b>${c.rad} mm</b> · ${c.sockets.join('/')} · uchladí do <b>${c.tdpRated} W</b> · ~${c.noise} dB`,
 ram: c=>`<b>${c.type}</b> · <b>${c.cap} GB</b> · ${c.speed} MHz`,
 gpu: c=>`<b>${c.vram} GB</b> · délka <b>${c.length} mm</b> · ${c.slots} sloty · <b>${c.power} W</b> · herní <b>${c.tier}/100</b>`,
 sto: c=>`<b>${c.kind}</b> · ${c.cap} · ${c.speed} MB/s`,
 psu: c=>`<b>${c.watts} W</b> · <b>${c.form}</b> · ${c.rating}`,
};

/* =================== MISE =================== */
const MISS=[
 {id:'value', ic:'💰', name:'Nejlepší poměr cena/výkon', desc:'Postav funkční herní PC, který dá <b>co nejvíc výkonu za co nejmíň peněz</b>. Vyhýbej se předraženým dílům.'},
 {id:'power', ic:'🚀', name:'Co nejvýkonnější PC', desc:'Postav <b>co nejvýkonnější</b> funkční herní stroj. Cena nehraje roli – jde o maximální FPS.'},
];

/* =================== STAV =================== */
let curMission=null, missionsDone={}, best={power:0,value:0}, curCat='case', sel={};
const $=id=>document.getElementById(id);

function renderMissions(){
 $('missionScreen').style.display='block'; $('shop').style.display='none'; $('footer').style.display='none'; $('report').className='report';
 const d=$('dots'); d.innerHTML='';
 MISS.forEach(m=>{ const e=document.createElement('div'); e.className='d'+(missionsDone[m.id]?' done':''); e.textContent=m.ic+' '+(missionsDone[m.id]?'✓':'…'); d.appendChild(e); });
 const wrap=$('missions'); wrap.innerHTML='';
 MISS.forEach(m=>{ const el=document.createElement('div'); el.className='mcard'+(missionsDone[m.id]?' done':'');
  el.innerHTML=`<div class="ic">${m.ic}</div><h3>${m.name}</h3><p>${m.desc}</p>`+(missionsDone[m.id]?`<div class="badge">✅ hotovo</div>`:'');
  el.addEventListener('click',()=>openShop(m)); wrap.appendChild(el); });
 if(MISS.every(m=>missionsDone[m.id])){ const b=$('doneBanner'); b.style.display='block';
  b.innerHTML='🏆 <b>Postavil jsi oba počítače!</b><br><span style="color:var(--muted);font-size:13px">Nejvyšší výkon: '+best.power+'/100 · nejlepší poměr: '+best.value+' bodů / 10 000 Kč</span>'; }
}
function openShop(m){ curMission=m; sel={}; curCat='case';
 $('missionScreen').style.display='none'; $('shop').style.display='block'; $('footer').style.display='block'; $('report').className='report';
 $('missionBar').innerHTML=`${m.ic} Mise: <b>${m.name}</b> <span class="link" onclick="renderMissions()">← zpět na výběr mise</span>`;
 render();
}
function renderChips(){ const c=$('chips'); c.innerHTML='';
 CATS.forEach(cat=>{ const el=document.createElement('div'); el.className='chip'+(cat.key===curCat?' active':'');
  el.innerHTML=`${cat.ic} ${cat.lab} ${sel[cat.key]?'<span class="ok">✓</span>':''}`;
  el.addEventListener('click',()=>{curCat=cat.key; render();}); c.appendChild(el); }); }
function renderCat(){ const cat=CATS.find(c=>c.key===curCat);
 $('catHead').innerHTML=`<h2>${cat.ic} ${cat.lab}</h2><p>${cat.hint}</p>`;
 const cards=$('cards'); cards.innerHTML='';
 DB_[cat.key].forEach(c=>{ const el=document.createElement('div'); el.className='pcard'+(sel[cat.key]===c?' sel':'');
  el.innerHTML=`<div class="pr">${KČ(c.price)}</div><div class="brand">${c.brand}</div><div class="nm">${c.name}</div><div class="spec">${spec[cat.key](c)}</div><div class="selmark">✓ vybráno</div>`;
  el.addEventListener('click',()=>{ sel[cat.key]=c; const idx=CATS.findIndex(x=>x.key===curCat); if(idx<CATS.length-1&&!sel[CATS[idx+1].key]) curCat=CATS[idx+1].key; render(); window.scrollTo(0,0); });
  cards.appendChild(el); }); }
function totalPrice(){ return CATS.reduce((s,c)=>s+(sel[c.key]?sel[c.key].price:0),0); }
function renderFoot(){ const n=CATS.filter(c=>sel[c.key]).length;
 $('footInfo').innerHTML=`Vybráno <b>${n}/8</b> · Cena: <b>${KČ(totalPrice())}</b>`; $('buildBtn').disabled=n<8; }
function render(){ renderChips(); renderCat(); renderFoot(); }

/* =================== KONTROLA =================== */
function evaluate(){
 const b=sel, errs=[], oks=[];
 const add=(cond,ok,bad)=>{ (cond?oks:errs).push(cond?ok:bad); };
 add(b.cpu.socket===b.mb.socket, `Procesor i deska mají socket ${b.cpu.socket}`, `Procesor (${b.cpu.socket}) NEPASUJE do desky (${b.mb.socket})`);
 add(b.ram.type===b.mb.ram, `Paměť ${b.ram.type} sedí do desky`, `Paměť ${b.ram.type} nejde do desky – deska umí ${b.mb.ram}`);
 add(b.case.form.includes(b.mb.form), `Deska ${b.mb.form} se vejde do skříně`, `Deska ${b.mb.form} se NEVEJDE do skříně (podpora: ${b.case.form.join(', ')})`);
 add(b.gpu.length<=b.case.maxGpu, `Grafika (${b.gpu.length} mm) se vejde do skříně`, `Grafika je moc dlouhá: ${b.gpu.length} mm, skříň zvládne ${b.case.maxGpu} mm`);
 add(b.cool.sockets.includes(b.cpu.socket), `Chladič pasuje na socket ${b.cpu.socket}`, `Chladič nepasuje na socket ${b.cpu.socket} (umí ${b.cool.sockets.join(', ')})`);
 if(b.cool.type==='air') add(b.cool.height<=b.case.maxCool, `Chladič (${b.cool.height} mm) se do skříně vejde`, `Vzduchový chladič je moc vysoký: ${b.cool.height} mm, skříň má ${b.case.maxCool} mm`);
 else add(b.cool.rad<=b.case.rad, `Vodní chladič (${b.cool.rad} mm) se do skříně vejde`, `Radiátor ${b.cool.rad} mm se nevejde – skříň zvládne ${b.case.rad} mm`);
 add(b.cool.tdpRated>=b.cpu.tdp, `Chladič utáhne teplo procesoru (${b.cpu.tdp} W)`, `Slabý chladič: procesor dělá ${b.cpu.tdp} W, chladič zvládne ${b.cool.tdpRated} W → přehřívání`);
 add(b.psu.form===b.case.psu, `Zdroj ${b.psu.form} pasuje do skříně`, `Špatný formát zdroje: skříň chce ${b.case.psu}, máš ${b.psu.form}`);
 const needed=b.cpu.power+b.gpu.power+120;
 add(b.psu.watts>=needed, `Zdroj má dost výkonu (${b.psu.watts} W ≥ potřeba ~${needed} W)`, `Slabý zdroj: potřeba ~${needed} W, máš ${b.psu.watts} W`);
 return {errs,oks,needed};
}

/* =================== VÝKON (hodně parametrů) =================== */
function metrics(){
 const b=sel, gpu=b.gpu.tier, cpu=b.cpu.tier, notes=[];
 let score=Math.round(gpu*0.7 + Math.min(gpu,cpu*1.15)*0.3);
 const balance=Math.max(0,100-Math.abs(cpu-gpu));
 if(cpu<gpu-20){ score-=8; notes.push(['bad','Procesor brzdí grafiku (CPU bottleneck) – nevytěžíš plný výkon karty.']); }
 else notes.push(['ok','Procesor a grafika jsou slušně vyvážené.']);
 if(b.ram.cap<16){ score-=10; notes.push(['bad','Málo RAM (pod 16 GB) – moderní hry budou sekat.']); }
 else if(b.ram.cap>=32) notes.push(['ok','Dost paměti i na hry a multitasking.']);
 if(b.sto.kind==='HDD') notes.push(['bad','Hry na HDD = pomalé načítání. Doporučen SSD.']);
 else notes.push(['ok','Rychlé SSD úložiště – svižné načítání.']);
 score=Math.max(5,Math.min(100,score));
 const cap=Math.round(cpu*2.6);
 const fps1080=Math.min(cap,Math.round(gpu*1.9)), fps1440=Math.min(cap,Math.round(gpu*1.3)), fps4k=Math.round(gpu*0.7);
 const draw=b.cpu.power+b.gpu.power+80;
 const psuHead=Math.round((b.psu.watts-draw)/b.psu.watts*100);
 const thermHead=Math.max(0,Math.round((b.cool.tdpRated-b.cpu.tdp)/b.cool.tdpRated*100));
 const ts3d=b.gpu.ts;
 const cine=Math.round(b.cpu.mc*400);
 const passmark=Math.round(b.cpu.mc*350+3000);
 const bottleneck = cpu<gpu-20?'CPU brzdí GPU' : gpu<cpu-20?'GPU je limit (u her běžné)' : 'vyvážené';
 let vramV = b.gpu.vram>=16?'i 4K a do budoucna' : b.gpu.vram>=12?'pohodlně 1440p' : b.gpu.vram>=8?'OK 1080p/1440p' : 'málo i na 1080p';
 let catg = fps1440>=100?'🔥 1440p Ultra i 4K – špičkový herní stroj' : fps1440>=60?'💪 1440p na vysoké detaily' : fps1080>=60?'👍 1080p plynule na vysoké' : '🙂 1080p na střední detaily';
 return {score,fps1080,fps1440,fps4k,catg,notes,gpuTier:gpu,cpuTier:cpu,mc:b.cpu.mc,ts3d,cine,passmark,draw,psuHead,thermHead,balance,bottleneck,vram:b.gpu.vram,vramV,ssd:b.sto.speed,ssdKind:b.sto.kind,ramCap:b.ram.cap,ramType:b.ram.type,ramSpeed:b.ram.speed,noise:b.cool.noise,psuW:b.psu.watts};
}
function tile(lbl,val,sub,pct,cls){ return `<div class="tile"><div class="lbl">${lbl}</div><div class="val">${val}${sub?` <small>${sub}</small>`:''}</div>${pct!=null?`<div class="bar"><i class="${cls||'b-cyan'}" style="width:${Math.max(3,Math.min(100,pct))}%"></i></div>`:''}</div>`; }

function buildIt(){
 const {errs,oks}=evaluate(); const works=errs.length===0; const price=totalPrice();
 $('shop').style.display='none'; $('footer').style.display='none';
 const r=$('report'); r.className='report show'; let html='';
 if(works){
  const p=metrics();
  const value=Math.round(p.score*10000/price);
  const valLbl = value>=22?'🔥 skvělý poměr cena/výkon' : value>=15?'👍 dobrý poměr' : '🙂 dá se, ale je to drahé';
  html+=`<div class="verdict ok"><div style="font-size:44px">✅</div><h2>Počítač naběhne!</h2><div style="color:var(--muted)">Všechny komponenty jsou kompatibilní. Cena: <b style="color:var(--amber)">${KČ(price)}</b></div></div>`;
  // hlavní gauge
  html+=`<div class="panel"><div class="ph">Herní výkon · celkové skóre</div>
   <div class="scoreBig"><span class="n">${p.score}</span><span class="m">/ 100</span></div>
   <div class="meter"><div style="width:${p.score}%">${p.score}</div></div>
   <div class="catg">${p.catg}</div>
   <div class="fps"><div class="f"><div class="n">${p.fps1080}</div><div class="l">FPS · 1080p</div></div><div class="f"><div class="n">${p.fps1440}</div><div class="l">FPS · 1440p</div></div><div class="f"><div class="n">${p.fps4k}</div><div class="l">FPS · 4K</div></div></div></div>`;
  // dashboard s parametry
  html+=`<div class="panel"><div class="ph">Rozbor komponent · telemetrie</div><div class="dash">`;
  html+=tile('GPU výkon',p.gpuTier,'/100',p.gpuTier,'b-green');
  html+=tile('CPU herní',p.cpuTier,'/100',p.cpuTier,'b-cyan');
  html+=tile('CPU produktivita',p.mc,'/100',p.mc,'b-purple');
  html+=tile('Vyváženost',p.balance+'%',p.bottleneck,p.balance,'b-amber');
  html+=tile('3DMark Time Spy',p.ts3d.toLocaleString('cs-CZ'),'grafika',Math.min(100,p.ts3d/380),'b-green');
  html+=tile('Cinebench R23',p.cine.toLocaleString('cs-CZ'),'multi-core',Math.min(100,p.cine/420),'b-purple');
  html+=tile('PassMark CPU',p.passmark.toLocaleString('cs-CZ'),null,Math.min(100,p.passmark/430),'b-cyan');
  html+=tile('VRAM',p.vram+' GB',p.vramV,p.vram/24*100,'b-green');
  html+=tile('Spotřeba PC',p.draw+' W','ve hře',Math.min(100,p.draw/8),'b-red');
  html+=tile('Rezerva zdroje',p.psuHead+'%',p.psuW+' W',p.psuHead,p.psuHead>=30?'b-green':'b-amber');
  html+=tile('Chlazení – rezerva',p.thermHead+'%','tepla navíc',p.thermHead,p.thermHead>=25?'b-green':'b-amber');
  html+=tile('Hlučnost',p.noise+' dB',p.noise<=34?'tiché':'hlučnější',Math.min(100,(50-p.noise)/22*100),'b-cyan');
  html+=tile('Rychlost disku',p.ssd.toLocaleString('cs-CZ'),'MB/s ('+p.ssdKind+')',Math.min(100,p.ssd/75),'b-amber');
  html+=tile('RAM',p.ramCap+' GB',p.ramType+' '+p.ramSpeed,Math.min(100,p.ramCap/64*100),'b-purple');
  html+=tile('Cena / výkon',value,'b. / 10 000 Kč',Math.min(100,value*3.3),'b-green');
  html+=tile('Cena celkem',KČ(price).replace(' Kč',''),'Kč',null,'b-amber');
  html+=`</div></div>`;
  if(curMission.id==='value') html+=`<div class="panel"><div class="ph">Hodnocení mise · cena/výkon</div><div class="scoreBig"><span class="n">${value}</span><span class="m">bodů výkonu / 10 000 Kč</span></div><div class="catg">${valLbl}</div></div>`;
  html+=`<div class="panel"><div class="ph">Poznámky</div>`;
  p.notes.forEach(([t,m])=>html+=`<div class="note">${t==='ok'?'✅':'⚠️'} ${m}</div>`);
  html+=`<div class="note" style="color:var(--muted)">Skóre i FPS jsou orientační (náročná AAA hra, vysoké detaily). Syntetické testy jsou ilustrativní.</div></div>`;
  html+=`<div class="panel"><b>Kód pro učitele:</b> <span class="code">PCB-${String(p.score).padStart(3,'0')}-${String(value).padStart(3,'0')}</span></div>`;
  missionsDone[curMission.id]=true; best.power=Math.max(best.power,p.score); best.value=Math.max(best.value,value);
  submit();
 } else {
  html+=`<div class="verdict no"><div style="font-size:44px">❌</div><h2>Počítač nenaběhne</h2><div style="color:var(--muted)">Našli jsme <b style="color:#fecaca">${errs.length}</b> ${errs.length===1?'chybu':'chyb'} v kompatibilitě. Oprav je a zkus to znovu.</div></div>`;
 }
 html+=`<div class="checkList"><h4>Kontrola kompatibility</h4>`;
 errs.forEach(m=>html+=`<div class="chk bad">❌ ${m}</div>`);
 oks.forEach(m=>html+=`<div class="chk ok">✅ ${m}</div>`);
 html+=`</div><div class="rbtns">${works?'':'<button class="fix" onclick="backToShop()">🔧 Opravit sestavu</button>'}<button onclick="backToShop()">← Zpět do katalogu</button><button onclick="renderMissions()">🎯 Zpět na mise</button></div>`;
 r.innerHTML=html; window.scrollTo(0,0);
}
function backToShop(){ $('report').className='report'; $('shop').style.display='block'; $('footer').style.display='block'; render(); }

/* =================== ŽEBŘÍČEK =================== */
const FB='https://letni-skola-hry-default-rtdb.firebaseio.com';
const SID='pc_'+Math.random().toString(36).slice(2,10);
function submit(){
 const name=($('playerName').value||'').trim().slice(0,24); if(!name) return;
 const both=MISS.every(m=>missionsDone[m.id]);
 fetch(FB+'/scores/'+SID+'.json',{method:'PUT',body:JSON.stringify(
  {name, game:'pcsim', levels:Object.keys(missionsDone).length, score:best.power, value:best.value, done:both, ts:Date.now()})}).catch(()=>{});
}
(function(){ const inp=$('playerName');
 try{ const s=localStorage.getItem('ls_playerName'); if(s) inp.value=s; }catch(e){}
 inp.addEventListener('input',()=>{ try{localStorage.setItem('ls_playerName',inp.value);}catch(e){} });
})();

renderMissions();
</script>
</body>
</html>
