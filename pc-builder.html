<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Builder – postav si herní počítač</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--bg:#0b1220;--card:#131f36;--card2:#1c2c4a;--line:#2a3c5e;--cyan:#38bdf8;--good:#22c55e;--bad:#ef4444;--amber:#fbbf24;--purple:#a78bfa;--text:#e6edf7;--muted:#93a4bd;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:radial-gradient(circle at 50% -10%,#141d38,#0b1220 65%);color:var(--text);min-height:100vh;line-height:1.5;}
  .wrap{max-width:920px;margin:0 auto;padding:12px 12px 110px;}
  h1{font-size:22px;text-align:center;margin:6px 0 2px;}
  .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:10px;}
  .name{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--text);font-size:15px;margin-bottom:10px;}

  .chips{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;position:sticky;top:0;background:linear-gradient(#0b1220,#0b1220ee);z-index:5;}
  .chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text);white-space:nowrap;display:flex;gap:6px;align-items:center;}
  .chip.active{background:var(--cyan);color:#04121f;border-color:var(--cyan);}
  .chip .ok{color:var(--good);font-weight:900;}
  .chip.active .ok{color:#04121f;}

  .catHead{margin:6px 0 8px;}
  .catHead h2{font-size:19px;margin:0;}
  .catHead p{color:var(--muted);font-size:13px;margin:2px 0 0;}

  .cards{display:grid;grid-template-columns:1fr;gap:10px;}
  @media(min-width:620px){.cards{grid-template-columns:1fr 1fr;}}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;transition:border-color .12s;position:relative;}
  .pcard:hover{border-color:var(--cyan);}
  .pcard.sel{border-color:var(--good);background:#13291d;}
  .pcard .brand{font-size:12px;color:var(--purple);font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
  .pcard .nm{font-weight:800;font-size:15px;margin:2px 0 4px;}
  .pcard .spec{font-size:12.5px;color:var(--muted);line-height:1.5;}
  .pcard .spec b{color:var(--text);}
  .pcard .pr{position:absolute;top:12px;right:12px;font-weight:800;color:var(--amber);font-size:14px;}
  .pcard .selmark{display:none;position:absolute;bottom:10px;right:12px;color:var(--good);font-weight:800;font-size:12px;}
  .pcard.sel .selmark{display:block;}

  .footer{position:fixed;left:0;right:0;bottom:0;background:#0c1424;border-top:1px solid var(--line);padding:10px 14px;z-index:8;}
  .footer .inner{max-width:920px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .footer .info{flex:1;font-size:13px;color:var(--muted);}
  .footer .info b{color:var(--text);}
  .bigbtn{border:none;border-radius:11px;padding:13px 20px;font-size:16px;font-weight:800;cursor:pointer;color:#04121f;background:linear-gradient(180deg,#86efac,#22c55e);}
  .bigbtn:disabled{opacity:.5;cursor:not-allowed;}
  .bigbtn:active{transform:translateY(1px);}

  /* report */
  .report{display:none;}
  .report.show{display:block;}
  .verdict{border-radius:14px;padding:16px;text-align:center;margin-bottom:12px;}
  .verdict.ok{background:linear-gradient(180deg,#134e2a,#0b1220);border:1px solid var(--good);}
  .verdict.no{background:linear-gradient(180deg,#4a1620,#0b1220);border:1px solid var(--bad);}
  .verdict h2{margin:6px 0;font-size:24px;}
  .checkList{background:var(--card);border-radius:12px;padding:12px;margin-bottom:12px;}
  .checkList h4{margin:0 0 8px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .chk{font-size:13.5px;padding:5px 0;border-bottom:1px solid #1b2740;}
  .chk:last-child{border-bottom:none;}
  .chk.ok{color:#bbf7d0;} .chk.bad{color:#fecaca;}
  .perf{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;}
  .perf h3{margin:0 0 10px;font-size:17px;}
  .meter{height:26px;background:#0a1120;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .meter>div{height:100%;background:linear-gradient(90deg,#22c55e,#38bdf8,#a78bfa);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#04121f;font-weight:800;font-size:13px;}
  .fps{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;text-align:center;}
  .fps .f{background:var(--card2);border-radius:10px;padding:10px;}
  .fps .f .n{font-size:22px;font-weight:800;color:var(--cyan);}
  .fps .f .l{font-size:11px;color:var(--muted);}
  .note{font-size:13px;margin-top:10px;color:#dbe7ff;}
  .note b{color:var(--amber);}
  .rbtns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .rbtns button{flex:1;min-width:130px;border:none;border-radius:10px;padding:12px;font-weight:800;font-size:14px;cursor:pointer;background:var(--card2);color:var(--text);}
  .rbtns .fix{background:linear-gradient(180deg,#fca5a5,#ef4444);color:#04121f;}
  .code{font-family:monospace;font-size:20px;font-weight:800;color:var(--amber);letter-spacing:2px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>🖥️ PC Builder – postav si herní počítač</h1>
  <div class="sub">Vyber komponenty z katalogu. Nikdo ti neporadí – <b>kompatibilitu i výkon se dozvíš až na konci</b>. Začni skříní a deskou, ostatní musí sednout k nim.</div>
  <input id="playerName" class="name" placeholder="Tvoje jméno / přezdívka (pro žebříček)">

  <!-- SHOP -->
  <div id="shop">
    <div class="chips" id="chips"></div>
    <div class="catHead" id="catHead"></div>
    <div class="cards" id="cards"></div>
  </div>

  <!-- REPORT -->
  <div class="report" id="report"></div>
</div>

<div class="footer" id="footer">
  <div class="inner">
    <div class="info" id="footInfo">Vybráno 0/8 · Cena: 0 Kč</div>
    <button class="bigbtn" id="buildBtn" onclick="buildIt()" disabled>🔧 Sestavit počítač</button>
  </div>
</div>

<script>
const KČ=n=>Math.round(n).toLocaleString('cs-CZ')+' Kč';

/* =================== KATALOG =================== */
const DB_={

  {brand:'AMD',name:'Ryzen 7 7800X3D',socket:'AM5',cores:'8 jader / 16 vl.',tdp:120,power:130,tier:95,price:11000},

  {brand:'Intel',name:'Laminar (boxový)',type:'air',sockets:['LGA1700'],height:50,tdpRated:75,price:0},
  {brand:'Cooler Master',name:'Hyper 212',type:'air',sockets:['LGA1700','AM4','AM5'],height:159,tdpRated:150,price:900},
  {brand:'be quiet!',name:'Dark Rock 4',type:'air',sockets:['LGA1700','AM4','AM5'],height:159,tdpRated:200,price:2200},
  {brand:'Noctua',name:'NH-D15',type:'air',sockets:['LGA1700','AM4','AM5'],height:165,tdpRated:250,price:2600},
  {brand:'Corsair',name:'iCUE H100i (AIO 240)',type:'aio',sockets:['LGA1700','AM4','AM5'],rad:240,tdpRated:250,price:3200},
  {brand:'Arctic',name:'Liquid Freezer II 280',type:'aio',sockets:['LGA1700','AM4','AM5'],rad:280,tdpRated:300,price:2500},
 ],
 ram:[
  {brand:'Crucial',name:'8 GB DDR4-3200',type:'DDR4',cap:8,speed:3200,price:600},
  {brand:'Corsair',name:'Vengeance 16 GB DDR4-3200',type:'DDR4',cap:16,speed:3200,price:1200},
  {brand:'G.Skill',name:'Ripjaws 32 GB DDR4-3600',type:'DDR4',cap:32,speed:3600,price:2300},
  {brand:'Kingston',name:'Fury 16 GB DDR5-5200',type:'DDR5',cap:16,speed:5200,price:1700},
  {brand:'G.Skill',name:'Trident Z5 32 GB DDR5-6000',type:'DDR5',cap:32,speed:6000,price:3000},
  {brand:'Corsair',name:'Dominator 64 GB DDR5-5600',type:'DDR5',cap:64,speed:5600,price:6500},
 ],
 gpu:[
  {brand:'ASUS',name:'Dual RTX 4060',vram:8,length:200,power:115,tier:45,price:8000},
  {brand:'Sapphire',name:'RX 7600 Pulse',vram:8,length:200,power:165,tier:42,price:7000},
  {brand:'MSI',name:'Ventus RTX 4070 Super',vram:12,length:250,power:220,tier:72,price:15500},
  {brand:'Sapphire',name:'RX 7800 XT Nitro+',vram:16,length:267,power:263,tier:70,price:14000},
  {brand:'Gigabyte',name:'RTX 4080 Super Gaming',vram:16,length:340,power:320,tier:88,price:27000},
  {brand:'ASUS',name:'TUF RX 7900 XTX',vram:24,length:320,power:355,tier:90,price:25000},
  {brand:'ASUS',name:'ROG Strix RTX 4090',vram:24,length:358,power:450,tier:100,price:48000},
  {brand:'MSI',name:'Ventus RTX 4060 Ti',vram:8,length:200,power:160,tier:52,price:10000},
 ],
 sto:[
  {brand:'Samsung',name:'990 Pro 1 TB (NVMe)',kind:'NVMe SSD',cap:'1 TB',price:2400},
  {brand:'WD',name:'Black SN770 1 TB (NVMe)',kind:'NVMe SSD',cap:'1 TB',price:1600},
  {brand:'Crucial',name:'P3 Plus 2 TB (NVMe)',kind:'NVMe SSD',cap:'2 TB',price:2800},
  {brand:'Samsung',name:'870 EVO 1 TB (SATA)',kind:'SATA SSD',cap:'1 TB',price:1500},
  {brand:'Seagate',name:'Barracuda 2 TB (HDD)',kind:'HDD',cap:'2 TB',price:1100},
  {brand:'Kingston',name:'NV2 500 GB (NVMe)',kind:'NVMe SSD',cap:'500 GB',price:800},
 ],
 psu:[
  {brand:'Cooler Master',name:'MWE 550 W',watts:550,form:'ATX',rating:'Bronze',price:1200},
  {brand:'be quiet!',name:'Pure Power 11 650 W',watts:650,form:'ATX',rating:'Gold',price:1800},
  {brand:'Corsair',name:'RM750e 750 W',watts:750,form:'ATX',rating:'Gold',price:2300},
  {brand:'Seasonic',name:'Focus GX 850 W',watts:850,form:'ATX',rating:'Gold',price:2900},
  {brand:'EVGA',name:'SuperNOVA 1000 W',watts:1000,form:'ATX',rating:'Gold',price:3800},
  {brand:'Corsair',name:'SF750 (SFX)',watts:750,form:'SFX',rating:'Platinum',price:3400},
 ],
};
const CATS=[
 {key:'case',lab:'Skříň',ic:'📦',hint:'Urči velikost (form factor), max délku grafiky a typ zdroje. Začni tady.'},
 {key:'mb',  lab:'Deska',ic:'🟩',hint:'Určuje socket procesoru a typ paměti (DDR4/DDR5). Musí se vejít do skříně.'},
 {key:'cpu', lab:'Procesor',ic:'🧠',hint:'Musí mít stejný socket jako deska.'},
 {key:'cool',lab:'Chladič',ic:'🌀',hint:'Musí sednout na socket, vejít se do skříně a zvládnout teplo procesoru.'},
 {key:'ram', lab:'RAM',ic:'📊',hint:'Typ (DDR4/DDR5) musí odpovídat desce.'},
 {key:'gpu', lab:'Grafika',ic:'🎮',hint:'Nesmí být delší, než dovolí skříň. Žere nejvíc energie.'},
 {key:'sto', lab:'Úložiště',ic:'💾',hint:'SSD je pro hry rychlejší než HDD.'},
 {key:'psu', lab:'Zdroj',ic:'🔌',hint:'Musí mít dost wattů a správný formát (ATX/SFX) pro skříň.'},
];
const spec={
 case:c=>`<b>${c.form.join(' / ')}</b> · GPU do <b>${c.maxGpu} mm</b> · chladič do <b>${c.maxCool} mm</b> · zdroj <b>${c.psu}</b>`,
 mb:  c=>`socket <b>${c.socket}</b> · ${c.chip} · <b>${c.ram}</b> · ${c.form} · ${c.slots}× slot`,
 cpu: c=>`socket <b>${c.socket}</b> · ${c.cores} · chlazení <b>${c.tdp} W</b> · špička ${c.power} W`,
 cool:c=> c.type==='air' ? `vzduch · ${c.sockets.join('/')} · výška <b>${c.height} mm</b> · do <b>${c.tdpRated} W</b>` : `voda AIO <b>${c.rad} mm</b> · ${c.sockets.join('/')} · do <b>${c.tdpRated} W</b>`,
 ram: c=>`<b>${c.type}</b> · <b>${c.cap} GB</b> · ${c.speed} MHz`,
 gpu: c=>`<b>${c.vram} GB</b> · délka <b>${c.length} mm</b> · <b>${c.power} W</b> · herní výkon ${c.tier}/100`,
 sto: c=>`<b>${c.kind}</b> · ${c.cap}`,
 psu: c=>`<b>${c.watts} W</b> · <b>${c.form}</b> · ${c.rating}`,
};

/* =================== STAV =================== */
let curCat='case', sel={};
const $=id=>document.getElementById(id);

function renderChips(){ const c=$('chips'); c.innerHTML='';
 CATS.forEach(cat=>{ const el=document.createElement('div'); el.className='chip'+(cat.key===curCat?' active':'');
  el.innerHTML=`${cat.ic} ${cat.lab} ${sel[cat.key]?'<span class="ok">✓</span>':''}`;
  el.addEventListener('click',()=>{curCat=cat.key; render();}); c.appendChild(el); }); }
function renderCat(){ const cat=CATS.find(c=>c.key===curCat);
 $('catHead').innerHTML=`<h2>${cat.ic} ${cat.lab}</h2><p>${cat.hint}</p>`;
 const cards=$('cards'); cards.innerHTML='';
 DB_[cat.key].forEach((c,i)=>{ const el=document.createElement('div'); el.className='pcard'+(sel[cat.key]===c?' sel':'');
  el.innerHTML=`<div class="pr">${KČ(c.price)}</div><div class="brand">${c.brand}</div><div class="nm">${c.name}</div><div class="spec">${spec[cat.key](c)}</div><div class="selmark">✓ vybráno</div>`;
  el.addEventListener('click',()=>{ sel[cat.key]=c; const idx=CATS.findIndex(x=>x.key===curCat); if(idx<CATS.length-1&&!sel[CATS[idx+1].key]) curCat=CATS[idx+1].key; render(); window.scrollTo(0,0); });
  cards.appendChild(el); }); }
function totalPrice(){ return CATS.reduce((s,c)=>s+(sel[c.key]?sel[c.key].price:0),0); }
function renderFoot(){ const n=CATS.filter(c=>sel[c.key]).length;
 $('footInfo').innerHTML=`Vybráno <b>${n}/8</b> · Cena: <b>${KČ(totalPrice())}</b>`;
 $('buildBtn').disabled = n<8; }
function render(){ renderChips(); renderCat(); renderFoot(); }

/* =================== KONTROLA + VÝKON =================== */
function evaluate(){
 const b=sel, errs=[], oks=[];
 const add=(cond,okMsg,badMsg)=>{ (cond?oks:errs).push(cond?okMsg:badMsg); };
 // socket
 add(b.cpu.socket===b.mb.socket, `Procesor i deska mají socket ${b.cpu.socket}`, `Procesor (${b.cpu.socket}) NEPASUJE do desky (${b.mb.socket})`);
 // ram
 add(b.ram.type===b.mb.ram, `Paměť ${b.ram.type} sedí do desky`, `Paměť ${b.ram.type} nejde do desky – deska umí ${b.mb.ram}`);
 // case fits mb
 add(b.case.form.includes(b.mb.form), `Deska ${b.mb.form} se vejde do skříně`, `Deska ${b.mb.form} se NEVEJDE do skříně (podpora: ${b.case.form.join(', ')})`);
 // gpu length
 add(b.gpu.length<=b.case.maxGpu, `Grafika (${b.gpu.length} mm) se vejde do skříně`, `Grafika je moc dlouhá: ${b.gpu.length} mm, skříň zvládne ${b.case.maxGpu} mm`);
 // cooler socket
 add(b.cool.sockets.includes(b.cpu.socket), `Chladič pasuje na socket ${b.cpu.socket}`, `Chladič nepasuje na socket ${b.cpu.socket} (umí ${b.cool.sockets.join(', ')})`);
 // cooler fit in case
 if(b.cool.type==='air') add(b.cool.height<=b.case.maxCool, `Chladič (${b.cool.height} mm) se do skříně vejde`, `Vzduchový chladič je moc vysoký: ${b.cool.height} mm, skříň má ${b.case.maxCool} mm`);
 else add(b.cool.rad<=b.case.rad, `Vodní chladič (${b.cool.rad} mm) se do skříně vejde`, `Radiátor ${b.cool.rad} mm se nevejde – skříň zvládne ${b.case.rad} mm`);
 // cooler power
 add(b.cool.tdpRated>=b.cpu.tdp, `Chladič utáhne teplo procesoru (${b.cpu.tdp} W)`, `Slabý chladič: procesor dělá ${b.cpu.tdp} W, chladič zvládne ${b.cool.tdpRated} W → přehřívání`);
 // psu form
 add(b.psu.form===b.case.psu, `Zdroj ${b.psu.form} pasuje do skříně`, `Špatný formát zdroje: skříň chce ${b.case.psu}, máš ${b.psu.form}`);
 // psu watts
 const needed=b.cpu.power+b.gpu.power+120;
 add(b.psu.watts>=needed, `Zdroj má dost výkonu (${b.psu.watts} W ≥ potřeba ~${needed} W)`, `Slabý zdroj: potřeba ~${needed} W, máš ${b.psu.watts} W`);
 return {errs,oks,needed};
}

function performance(){
 const b=sel;
 // gaming score: GPU dominates, CPU can bottleneck
 const gpu=b.gpu.tier, cpu=b.cpu.tier;
 // CPU cap on high-fps: strong cpu needed to feed strong gpu
 const cpuCap=cpu; // relative
 let score=Math.round(gpu*0.7 + Math.min(gpu,cpu*1.15)*0.3);
 // penalties
 let notes=[];
 if(cpu < gpu-20){ score-=8; notes.push(['bad','Procesor brzdí grafiku (CPU bottleneck) – ve hrách nevytěžíš plný výkon karty.']); }
 else notes.push(['ok','Procesor a grafika jsou slušně vyvážené.']);
 if(b.ram.cap<16){ score-=10; notes.push(['bad','Málo RAM (pod 16 GB) – moderní hry budou sekat.']); }
 else if(b.ram.cap>=32) notes.push(['ok','Dost paměti i na hry a multitasking.']);
 if(b.sto.kind==='HDD'){ notes.push(['bad','Systém a hry na HDD = pomalé načítání. Doporučen SSD.']); }
 else notes.push(['ok','Rychlé SSD úložiště – svižné načítání.']);
 score=Math.max(5,Math.min(100,score));
 // FPS estimates (ilustrativní AAA hra, vysoké detaily), limited by cpu
 const cpuFpsCap=Math.round(cpu*2.6);
 const fps1080=Math.min(cpuFpsCap, Math.round(gpu*1.9));
 const fps1440=Math.min(cpuFpsCap, Math.round(gpu*1.3));
 const fps4k  =Math.round(gpu*0.7);
 let cat;
 if(fps1440>=100) cat='🔥 1440p Ultra i 4K – špičkový herní stroj';
 else if(fps1440>=60) cat='💪 1440p na vysoké detaily';
 else if(fps1080>=60) cat='👍 1080p plynule na vysoké';
 else cat='🙂 1080p na střední detaily';
 return {score,fps1080,fps1440,fps4k,cat,notes};
}

function buildIt(){
 const {errs,oks,needed}=evaluate();
 const works=errs.length===0;
 const price=totalPrice();
 $('shop').style.display='none'; $('footer').style.display='none';
 const r=$('report'); r.className='report show'; let html='';
 if(works){
  const p=performance();
  html+=`<div class="verdict ok"><div style="font-size:44px">✅</div><h2>Počítač naběhne!</h2><div style="color:var(--muted)">Všechny komponenty jsou kompatibilní. Cena sestavy: <b style="color:var(--amber)">${KČ(price)}</b></div></div>`;
  html+=`<div class="perf"><h3>🎯 Herní výkon: ${p.score}/100</h3><div class="meter"><div style="width:${p.score}%">${p.score}</div></div>
   <div style="text-align:center;margin-top:10px;font-weight:800;color:var(--cyan)">${p.cat}</div>
   <div class="fps"><div class="f"><div class="n">${p.fps1080}</div><div class="l">FPS · 1080p</div></div><div class="f"><div class="n">${p.fps1440}</div><div class="l">FPS · 1440p</div></div><div class="f"><div class="n">${p.fps4k}</div><div class="l">FPS · 4K</div></div></div>`;
  p.notes.forEach(([t,m])=>html+=`<div class="note">${t==='ok'?'✅':'⚠️'} ${m}</div>`);
  html+=`<div class="note" style="margin-top:12px;color:var(--muted)">FPS jsou orientační pro náročnou AAA hru na vysoké detaily.</div></div>`;
  html+=`<div class="perf"><b>Kód pro učitele:</b> <span class="code">PCB-${String(p.score).padStart(3,'0')}-${String(Math.round(price/1000)).padStart(3,'0')}</span></div>`;
  submit(p.score,p.fps1080,price);
 } else {
  html+=`<div class="verdict no"><div style="font-size:44px">❌</div><h2>Počítač nenaběhne</h2><div style="color:var(--muted)">Našli jsme <b style="color:#fecaca">${errs.length}</b> ${errs.length===1?'chybu':'chyby/chyb'} v kompatibilitě. Oprav je a zkus to znovu.</div></div>`;
 }
 html+=`<div class="checkList"><h4>Kontrola kompatibility</h4>`;
 errs.forEach(m=>html+=`<div class="chk bad">❌ ${m}</div>`);
 oks.forEach(m=>html+=`<div class="chk ok">✅ ${m}</div>`);
 html+=`</div>`;
 html+=`<div class="rbtns">${works?'':'<button class="fix" onclick="backToShop()">🔧 Opravit sestavu</button>'}<button onclick="backToShop()">← Zpět do katalogu</button><button onclick="resetAll()">🗑 Začít znovu</button></div>`;
 r.innerHTML=html; window.scrollTo(0,0);
}
function backToShop(){ $('report').className='report'; $('shop').style.display='block'; $('footer').style.display='block'; render(); }
function resetAll(){ sel={}; curCat='case'; backToShop(); }

/* =================== ŽEBŘÍČEK =================== */
const FB='https://letni-skola-hry-default-rtdb.firebaseio.com';
const SID='pc_'+Math.random().toString(36).slice(2,10);
function submit(score,fps,price){
 const name=($('playerName').value||'').trim().slice(0,24); if(!name) return;
 fetch(FB+'/scores/'+SID+'.json',{method:'PUT',body:JSON.stringify(
  {name, game:'pcsim', score, fps, price, done:true, ts:Date.now()})}).catch(()=>{});
}
(function(){ const inp=$('playerName');
 try{ const s=localStorage.getItem('ls_playerName'); if(s) inp.value=s; }catch(e){}
 inp.addEventListener('input',()=>{ try{localStorage.setItem('ls_playerName',inp.value);}catch(e){} });
})();

render();
</script>
</body>
